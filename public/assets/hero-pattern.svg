<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Corporate glass towers">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2f7de1"/>
      <stop offset="100%" stop-color="#143d72"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9fc6f5" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1e5aa8" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="glass2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cfe3fb" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#2f7de1" stop-opacity="0.1"/>
    </linearGradient>
    <pattern id="win" width="26" height="38" patternUnits="userSpaceOnUse">
      <rect width="26" height="38" fill="none"/>
      <rect x="3" y="4" width="18" height="26" fill="#ffffff" fill-opacity="0.16"/>
    </pattern>
  </defs>

  <rect width="1440" height="900" fill="url(#sky)"/>

  <!-- distant towers -->
  <g opacity="0.45">
    <rect x="60"  y="320" width="120" height="580" fill="url(#glass2)"/>
    <rect x="220" y="240" width="100" height="660" fill="url(#glass2)"/>
    <rect x="1180" y="280" width="120" height="620" fill="url(#glass2)"/>
    <rect x="1320" y="220" width="120" height="680" fill="url(#glass2)"/>
  </g>

  <!-- main glass towers (perspective from below) -->
  <g>
    <polygon points="360,900 360,200 540,150 540,900" fill="url(#glass)"/>
    <polygon points="360,200 540,150 540,900 360,900" fill="url(#win)" opacity="0.9"/>
    <polygon points="540,150 560,150 560,900 540,900" fill="#0e2c54" fill-opacity="0.35"/>

    <polygon points="640,900 640,120 820,70 820,900" fill="url(#glass2)"/>
    <polygon points="640,120 820,70 820,900 640,900" fill="url(#win)" opacity="0.85"/>
    <polygon points="820,70 838,72 838,900 820,900" fill="#0e2c54" fill-opacity="0.3"/>

    <polygon points="900,900 900,260 1080,210 1080,900" fill="url(#glass)"/>
    <polygon points="900,260 1080,210 1080,900 900,900" fill="url(#win)" opacity="0.9"/>
    <polygon points="1080,210 1098,212 1098,900 1080,900" fill="#0e2c54" fill-opacity="0.35"/>
  </g>

  <!-- foreground vignette -->
  <rect width="1440" height="900" fill="#0e2c54" fill-opacity="0.12"/>
</svg>
