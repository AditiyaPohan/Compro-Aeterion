<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" role="img" aria-label="Aetherion corporate illustration">
  <defs>
    <linearGradient id="ci-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2f7de1"/>
      <stop offset="100%" stop-color="#1e5aa8"/>
    </linearGradient>
  </defs>
  <circle cx="240" cy="240" r="170" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1.5" stroke-dasharray="6 10"/>
  <circle cx="240" cy="240" r="130" fill="none" stroke="#d4af37" stroke-opacity="0.45" stroke-width="1.5"/>
  <!-- dashboard card -->
  <rect x="150" y="160" width="180" height="120" rx="14" fill="url(#ci-blue)"/>
  <rect x="168" y="182" width="60" height="8" rx="4" fill="#ffffff" fill-opacity="0.85"/>
  <rect x="168" y="200" width="100" height="6" rx="3" fill="#ffffff" fill-opacity="0.4"/>
  <polyline points="168,255 200,238 228,246 262,214 296,224" fill="none" stroke="#d4af37" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- center mark -->
  <g fill="none" stroke-width="7" stroke-linecap="round" transform="translate(190,190) scale(1.0)">
    <circle cx="33" cy="50" r="19" stroke="#d4af37"/>
    <circle cx="67" cy="50" r="19" stroke="#d4af37"/>
    <circle cx="50" cy="33" r="19" stroke="#ffffff"/>
    <circle cx="50" cy="67" r="19" stroke="#bcdcff"/>
  </g>
</svg>
